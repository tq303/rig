version: 1
rules:
    - files:
        - nvim
        - ghostty
      link: true
      locations:
        - ~/.config
    - files:
        - claude/CLAUDE.md
      link: true
      locations:
        - ~/.claude
    - files:
        - .zshsource
      link: true
      locations:
        - ~/
    - repo: https://github.com/valyuAI/skills
      files:
        - valyu-search/valyu-best-practices
      locations:
        - ~/.claude/commands
