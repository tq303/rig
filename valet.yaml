version: 1
rules:
    - files:
        - tmux
        - nvim
      platforms:
        - mac
        - ubuntu
        - server
      locations:
        - ~/.config
    - files:
        - nvim
      platforms:
        - windows
      locations:
        - $LOCALAPPDATA
    - files:
        - ghostty
      platforms:
        - mac
        - ubuntu
      locations:
        - ~/.config
    - files:
        - claude/CLAUDE.md
      locations:
        - ~/.claude
    - files:
        - .zshsource
      locations:
        - ~/
