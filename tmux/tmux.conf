# Prefix: Ctrl+Space
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 256 colour
set -g default-terminal "screen-256color"

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer history
set -g history-limit 10000

# No delay on escape
set -sg escape-time 0

# Status bar
set -g status-position top
set -g status-style bg=colour236,fg=colour245
set -g status-left ""
set -g status-right ""
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-style fg=colour245,bg=colour236
set -g window-status-current-style fg=colour87,bg=colour240,bold
set -g window-status-separator ""

# ── Tabs (windows) ────────────────────────────────────────────────────────────

bind a previous-window
bind s next-window
bind [ swap-window -d -t -1
bind ] swap-window -d -t +1
bind i command-prompt "rename-window '%%'"

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour87
set -g window-style bg=colour234
set -g window-active-style bg=colour232

# ── Splits (panes) ────────────────────────────────────────────────────────────

bind Enter split-window -v -c "#{pane_current_path}"
bind Space split-window -h -c "#{pane_current_path}"

bind p display-panes
set -g display-panes-colour colour76
set -g display-panes-active-colour colour87
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

bind BSpace resize-pane -L 10
bind '\' resize-pane -R 10
